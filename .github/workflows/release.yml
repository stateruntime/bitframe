name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match VERSION file ($VERSION)"
            exit 1
          fi

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Test (no default features)
        run: cargo test --no-default-features

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish bitframe-derive (or skip if already published)
        run: |
          set -euo pipefail
          set +e
          OUTPUT="$(cargo publish -p bitframe-derive 2>&1)"
          STATUS=$?
          set -e
          echo "${OUTPUT}"
          if [ "${STATUS}" -eq 0 ]; then exit 0; fi
          if echo "${OUTPUT}" | grep -q "already exists on crates.io index"; then
            echo "bitframe-derive already published; skipping."
            exit 0
          fi
          exit "${STATUS}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish bitframe (or skip if already published)
        run: |
          set -euo pipefail
          set +e
          OUTPUT="$(cargo publish -p bitframe 2>&1)"
          STATUS=$?
          set -e
          echo "${OUTPUT}"
          if [ "${STATUS}" -eq 0 ]; then exit 0; fi
          if echo "${OUTPUT}" | grep -q "already exists on crates.io index"; then
            echo "bitframe already published; skipping."
            exit 0
          fi
          exit "${STATUS}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract notes between this version header and the next
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Use delimiter for multiline output
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          prerelease: ${{ contains(github.ref_name, '-') }}
